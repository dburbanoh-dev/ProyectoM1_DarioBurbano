<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body>
    <a href="#main" class="skip-link">Saltar al contenido principal</a>
    <div
      id="toast-container"
      role="status"
      aria-live="polite"
      aria-atomic="false"
    ></div>

    <div class="wrapper">
      <header>
        <div class="logo">
          <span class="logo-name">Dario Burbano <span></span>
          <span class="logo-tagline">Generador de Paletas</span>
        </div>
      </header>

      <main id="main">
        <section class="hero" aria-labelledby="hero-title">
          <div>
            <h1 id="hero-title" class="hero-title">
              Genera paletas<br />únicas al instante.
            </h1>
          </div>

          <aside class="controls-panel" aria-label="Controles de generación">
            <div
              class="control-group"
              role="group"
              aria-labelledby="label-size"
            >
              <span id="label-size" class="control-label"
                >Tamaño de paleta</span
              >
              <div class="size-options">
                <button
                  class="size-btn active"
                  data-size="6"
                  aria-pressed="true"
                  aria-label="6 colores"
                >
                  6
                </button>
                <button
                  class="size-btn"
                  data-size="8"
                  aria-pressed="false"
                  aria-label="8 colores"
                >
                  8
                </button>
                <button
                  class="size-btn"
                  data-size="9"
                  aria-pressed="false"
                  aria-label="9 colores"
                >
                  9
                </button>
              </div>
            </div>

            <div
              class="control-group"
              role="group"
              aria-labelledby="label-format"
            >
              <span id="label-format" class="control-label">Formato</span>
              <div class="format-options">
                <button
                  class="format-btn active"
                  data-format="hex"
                  aria-pressed="true"
                >
                  HEX
                </button>
                <button
                  class="format-btn"
                  data-format="hsl"
                  aria-pressed="false"
                >
                  HSL
                </button>
              </div>
            </div>

            <button
              id="btn-generate"
              class="btn-generate"
              aria-describedby="palette-count"
            >
              Generar paleta 🎨
            </button>
          </aside>
        </section>

        <section id="palette-section" aria-labelledby="palette-heading">
          <h2 class="sr-only" id="palette-heading">Paleta generada</h2>

          <div id="palette-meta" class="palette-meta" hidden>
            <span
              id="palette-count"
              class="palette-count"
              aria-live="polite"
            ></span>
            <span id="palette-timestamp" class="palette-timestamp"></span>
          </div>

          <div id="empty-state" class="empty-state" aria-label="Sin paleta aún">
            <div class="empty-icon" aria-hidden="true">🎨</div>
            <p class="empty-title">Tu paleta aparecerá aquí</p>
            <p class="empty-sub">
              Selecciona el tamaño y el formato, luego presiona
              <strong>Generar paleta</strong>
            </p>
          </div>

          <div
            id="palette-grid"
            class="palette-grid"
            role="list"
            aria-label="Colores generados"
          ></div>
        </section>
      </main>

      <footer>
        <span class="footer-copy">© 2026 Dario Burbano</span>
        <span class="footer-badge">ProyectoM1</span>
      </footer>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
